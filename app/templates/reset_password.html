{% extends "base.html" %}
{% block title %}Reset Password - ShopHub{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-white to-purple-50 px-4 py-12">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center space-x-2">
                <i class="fas fa-store text-3xl text-indigo-600"></i>
                <span class="text-3xl font-extrabold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">ShopHub</span>
            </a>
            <p class="text-gray-500 mt-3">Enter your reset token and a new password.</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <form id="resetPasswordForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Reset Token</label>
                    <div class="relative">
                        <i class="fas fa-key absolute left-3.5 top-3.5 text-gray-400"></i>
                        <input type="text" name="token" id="resetToken" required
                               class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all duration-300"
                               placeholder="Paste your reset token">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">New Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3.5 top-3.5 text-gray-400"></i>
                        <input type="password" name="password" id="newPassword" required minlength="6"
                               class="w-full pl-10 pr-12 py-3 border-2 border-gray-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all duration-300"
                               placeholder="Enter new password (min 6 chars)">
                        <button type="button" onclick="togglePassword('newPassword', this)"
                                class="absolute right-3.5 top-3.5 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit"
                        class="w-full py-3 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-xl hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transform hover:scale-[1.02] transition-all duration-200 shadow-lg shadow-indigo-200">
                    <i class="fas fa-save mr-2"></i>Reset Password
                </button>
            </form>

            <div id="successSection" class="mt-6 hidden">
                <div class="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
                    <p class="text-sm text-green-800 font-medium mb-2">
                        <i class="fas fa-check-circle mr-1"></i>Password reset successful!
                    </p>
                    <a href="/login" class="text-indigo-600 font-semibold hover:text-indigo-700 transition-colors text-sm">
                        <i class="fas fa-sign-in-alt mr-1"></i>Go to Login
                    </a>
                </div>
            </div>

            <div class="mt-6 text-center">
                <p class="text-gray-500 text-sm">Don't have a token?
                    <a href="/forgot-password" class="text-indigo-600 font-semibold hover:text-indigo-700 transition-colors">Request one</a>
                </p>
            </div>

            <div class="mt-2 text-center">
                <a href="/login" class="text-gray-400 hover:text-gray-600 transition-colors text-sm">
                    <i class="fas fa-arrow-left mr-1"></i>Back to Login
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('resetPasswordForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = this.querySelector('button[type="submit"]');
    const originalHTML = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Resetting...';
    btn.disabled = true;

    try {
        const res = await fetch('/api/auth/reset-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                token: document.getElementById('resetToken').value,
                password: document.getElementById('newPassword').value
            })
        });

        const data = await res.json();

        if (res.ok) {
            document.getElementById('resetPasswordForm').classList.add('hidden');
            document.getElementById('successSection').classList.remove('hidden');
            showToast('Password reset successful! You can now log in.', 'success');
        } else {
            showToast(data.detail || 'Reset failed. Check your token.', 'error');
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    } catch (err) {
        showToast('Network error. Please try again.', 'error');
        btn.innerHTML = originalHTML;
        btn.disabled = false;
    }
});
</script>
{% endblock %}
