{% extends "base.html" %}
{% block title %}Register - ShopHub{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-indigo-50 via-white to-purple-50 px-4 py-12">
    <div class="max-w-md w-full">
        <div class="text-center mb-8">
            <a href="/" class="inline-flex items-center space-x-2">
                <i class="fas fa-store text-3xl text-indigo-600"></i>
                <span class="text-3xl font-extrabold bg-gradient-to-r from-indigo-600 to-purple-600 bg-clip-text text-transparent">ShopHub</span>
            </a>
            <p class="text-gray-500 mt-3">Create your account and start shopping!</p>
        </div>

        <div class="bg-white rounded-2xl shadow-xl p-8 border border-gray-100">
            <form id="registerForm" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Username</label>
                    <div class="relative">
                        <i class="fas fa-user absolute left-3.5 top-3.5 text-gray-400"></i>
                        <input type="text" name="username" id="regUsername" required minlength="3"
                               class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all duration-300"
                               placeholder="Choose a username">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Email Address</label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-3.5 top-3.5 text-gray-400"></i>
                        <input type="email" name="email" id="regEmail" required
                               class="w-full pl-10 pr-4 py-3 border-2 border-gray-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all duration-300"
                               placeholder="Enter your email">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">Password</label>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-3.5 top-3.5 text-gray-400"></i>
                        <input type="password" name="password" id="regPassword" required minlength="6"
                               class="w-full pl-10 pr-12 py-3 border-2 border-gray-200 rounded-xl text-sm focus:outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-100 transition-all duration-300"
                               placeholder="Min 6 characters">
                        <button type="button" onclick="togglePassword('regPassword', this)"
                                class="absolute right-3.5 top-3.5 text-gray-400 hover:text-gray-600">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit"
                        class="w-full py-3 px-4 bg-gradient-to-r from-indigo-600 to-purple-600 text-white font-semibold rounded-xl hover:from-indigo-700 hover:to-purple-700 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 transform hover:scale-[1.02] transition-all duration-200 shadow-lg shadow-indigo-200">
                    <i class="fas fa-user-plus mr-2"></i>Create Account
                </button>
            </form>

            <div class="mt-6 text-center">
                <p class="text-gray-500 text-sm">Already have an account?
                    <a href="/login" class="text-indigo-600 font-semibold hover:text-indigo-700 transition-colors">Sign in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_scripts %}
<script>
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const btn = this.querySelector('button[type="submit"]');
    const originalHTML = btn.innerHTML;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i>Creating account...';
    btn.disabled = true;

    const username = document.getElementById('regUsername').value.trim();
    const email = document.getElementById('regEmail').value.trim();
    const password = document.getElementById('regPassword').value;

    if (password.length < 6) {
        showToast('Password must be at least 6 characters', 'error');
        btn.innerHTML = originalHTML;
        btn.disabled = false;
        return;
    }

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, email, password })
        });

        const data = await res.json();

        if (res.ok) {
            showToast('Account created! Redirecting...', 'success');
            setTimeout(() => { window.location.href = data.redirect || '/'; }, 800);
        } else {
            showToast(data.detail || 'Registration failed', 'error');
            btn.innerHTML = originalHTML;
            btn.disabled = false;
        }
    } catch (err) {
        showToast('Network error. Please try again.', 'error');
        btn.innerHTML = originalHTML;
        btn.disabled = false;
    }
});
</script>
{% endblock %}
